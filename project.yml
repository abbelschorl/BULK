name: Bulk
options:
  bundleIdPrefix: com.daniel
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
targets:
  Bulk:
    type: application
    platform: iOS
    sources:
      - Bulk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daniel.bulk
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_NSCameraUsageDescription: "Bulk uses the camera only to scan food barcodes so you can log packaged foods quickly. Images never leave your device."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Bulk reads your body weight from Apple Health so your weight trend stays in sync. Only used if you enable weight sync in Settings."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "Bulk writes weigh-ins you log to Apple Health. Only used if you enable weight sync in Settings."
        SWIFT_ENFORCE_EXCLUSIVE_ACCESS: on
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
    entitlements:
      path: Bulk/Bulk.entitlements
      properties:
        com.apple.developer.healthkit: true
  BulkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BulkTests
    dependencies:
      - target: Bulk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.daniel.bulk.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Bulk:
    build:
      targets:
        Bulk: all
        BulkTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BulkTests
